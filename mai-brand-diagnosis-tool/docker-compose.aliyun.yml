name: mai-brand-platform

services:
  ai-brand-diagnosis:
    container_name: mai-ai-brand-diagnosis
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4173
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      TARGET_SOURCE_COUNT: ${TARGET_SOURCE_COUNT:-100}
      AI_SOURCE_COUNT: ${AI_SOURCE_COUNT:-100}
    expose:
      - "4173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4173/api/health | grep -q '\"ok\":true'"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 20s

  caddy:
    container_name: mai-platform-gateway
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - ai-brand-diagnosis
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
